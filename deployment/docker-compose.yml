services:
  app:
    build:
      context: ..
      dockerfile: deployment/docker/app/Dockerfile
      target: dev
    container_name: ${COMPOSE_PROJECT_NAME}-dev-app
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - ../:/app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env
    networks:
      - network

  app-prod:
    build:
      context: ..
      dockerfile: deployment/docker/app/Dockerfile
      target: prod
    restart: unless-stopped
    profiles: ["prod"]
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env
    networks:
      - network

  nginx:
    build:
      context: ..
      dockerfile: deployment/docker/nginx/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}-nginx
    restart: unless-stopped
    profiles: [ "prod" ]
    ports:
      - "${NGINX_PUBLISHED_PORT:-2000}:80"
    env_file:
      - ../.env
    depends_on:
      app-prod:
        condition: service_started
    networks:
      - network

  db:
    image: postgres:15-alpine
    container_name: ${COMPOSE_PROJECT_NAME}-db
    restart: unless-stopped
    profiles: [ "dev", "prod" ]
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ${COMPOSE_PROJECT_NAME}-pgadmin
    restart: unless-stopped
    profiles: [ "dev" ]
    ports:
      - "${PGADMIN_PUBLISHED_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    env_file:
      - ../.env
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - network

volumes:
  postgres-data:
    name: ${COMPOSE_PROJECT_NAME}-postgres-data
  pgadmin-data:
    name: ${COMPOSE_PROJECT_NAME}-pgadmin-data

networks:
  network:
    name: ${COMPOSE_PROJECT_NAME}-network
    driver: bridge